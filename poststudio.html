<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PostStudio — Academia do SESI</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;1,700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --preto:#1A1A1A;--cinza:#2A2A2A;--cinza2:#3A3A3A;--branco:#FFFFFF;
  --vermelho:#D01E28;--vermelho-l:rgba(208,30,40,.12);
  --texto:#E8E4DF;--texto2:#9A9590;--texto3:#6A6560;
  --brd:rgba(255,255,255,.08);--brd2:rgba(255,255,255,.15);
  --r:10px;--rs:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:var(--preto);color:var(--texto);min-height:100vh;font-size:15px;line-height:1.6}

/* CONFIG BANNER */
.config-bar{background:var(--vermelho);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.config-bar label{font-size:12px;font-weight:500;color:white;white-space:nowrap}
.config-input{flex:1;min-width:280px;padding:6px 10px;border-radius:var(--rs);border:none;font-size:12px;font-family:'Barlow',sans-serif;background:rgba(0,0,0,.3);color:white}
.config-input::placeholder{color:rgba(255,255,255,.5)}
.config-input:focus{outline:2px solid white}
.config-ok{width:10px;height:10px;border-radius:50%;background:#22C55E;flex-shrink:0}
.config-err{width:10px;height:10px;border-radius:50%;background:#EF4444;flex-shrink:0}
.config-status{font-size:11px;color:rgba(255,255,255,.8)}

/* LAYOUT */
.shell{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 44px)}
.sidebar{background:var(--cinza);border-right:1px solid var(--brd);display:flex;flex-direction:column;position:sticky;top:44px;height:calc(100vh - 44px);overflow-y:auto}

/* LOGO */
.logo{padding:18px 16px 14px;border-bottom:1px solid var(--brd)}
.logo-name{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;font-style:italic;color:var(--branco);letter-spacing:.02em}
.logo-name span{color:var(--vermelho)}
.logo-sub{font-size:10px;color:var(--texto3);text-transform:uppercase;letter-spacing:.1em;margin-top:2px}

/* BRAND */
.brand-sec{padding:14px 16px;border-bottom:1px solid var(--brd)}
.slbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--texto3);margin-bottom:10px}
.fg{margin-bottom:9px}
.fl{font-size:11px;color:var(--texto2);margin-bottom:3px;display:block}
.fi{width:100%;background:var(--preto);border:1px solid var(--brd);border-radius:var(--rs);padding:6px 9px;font-size:12px;font-family:'Barlow',sans-serif;color:var(--texto);outline:none}
.fi:focus{border-color:var(--vermelho)}
.fi option{background:var(--cinza)}
.cr{display:flex;gap:5px;flex-wrap:wrap}
.cs{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s}
.cs.on{border-color:var(--branco);transform:scale(1.15)}

/* MONTHS */
.mths{padding:12px 14px;flex:1}
.mb{display:block;width:100%;text-align:left;padding:6px 8px;border-radius:var(--rs);border:none;background:none;font-size:12px;color:var(--texto2);cursor:pointer;font-family:'Barlow',sans-serif;transition:background .1s;margin-bottom:1px}
.mb:hover{background:rgba(255,255,255,.05)}
.mb.on{background:var(--vermelho-l);color:var(--vermelho);font-weight:500}

/* MAIN */
.main{display:flex;flex-direction:column}
.topbar{background:var(--cinza);border-bottom:1px solid var(--brd);padding:11px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:44px;z-index:10}
.pills{display:flex;align-items:center;gap:5px}
.pill{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--texto3);padding:4px 10px;border-radius:20px}
.pill.on{background:var(--vermelho);color:white}
.pill.done{color:var(--vermelho)}
.psep{color:var(--brd2);font-size:12px}
.cnt{padding:20px;flex:1}
.view{display:none}.view.on{display:block}
.sec-lbl{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--texto3);margin-bottom:12px}

/* POST CARDS */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;margin-bottom:16px}
.pcard{background:var(--cinza);border:1px solid var(--brd);border-radius:var(--r);padding:12px;cursor:pointer;transition:border-color .15s,transform .1s}
.pcard:hover{border-color:var(--brd2);transform:translateY(-1px)}
.pcard.on{border-color:var(--vermelho);background:var(--vermelho-l)}
.ph{display:flex;align-items:center;gap:6px;margin-bottom:7px;flex-wrap:wrap}
.bdg{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.06em}
.b-data{background:rgba(208,30,40,.2);color:#FF6B70}
.b-edu{background:rgba(37,99,235,.2);color:#7EB3FF}
.b-motiv{background:rgba(168,85,247,.2);color:#C084FC}
.b-life{background:rgba(34,197,94,.2);color:#86EFAC}
.b-com{background:rgba(234,179,8,.2);color:#FDE047}
.pdate{font-size:10px;color:var(--texto3);margin-left:auto}
.ptitle{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;color:var(--branco);line-height:1.3;margin-bottom:3px}
.pdesc{font-size:11px;color:var(--texto2);line-height:1.4}

/* BANNER */
.ban{background:var(--cinza);border:1px solid var(--brd);border-left:3px solid var(--vermelho);border-radius:var(--r);padding:11px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.bcp{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.btitle{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--branco)}
.bmeta{font-size:10px;color:var(--texto3);margin-top:1px;display:flex;align-items:center;gap:5px}

/* RESEARCH */
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.rcard{background:var(--cinza);border:1px solid var(--brd);border-radius:var(--r);padding:14px}
.rc-lbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--texto3);margin-bottom:10px;display:flex;align-items:center;gap:5px}
.sdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sdot-g{background:#22C55E}.sdot-a{background:#F59E0B}.sdot-b{background:#3B82F6}
.tai{display:inline-flex;font-size:9px;font-weight:700;padding:1px 5px;border-radius:20px;background:rgba(208,30,40,.2);color:#FF6B70;text-transform:uppercase;letter-spacing:.04em}
.trow{display:flex;align-items:flex-start;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--brd);font-size:12px;gap:8px}
.trow:last-child{border-bottom:none}
.tctx{font-size:10px;color:var(--texto3);margin-top:2px;line-height:1.4}
.htag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap;text-transform:uppercase}
.h-alta{background:rgba(239,68,68,.2);color:#FCA5A5}
.h-estavel{background:rgba(245,158,11,.2);color:#FCD34D}
.h-emergente{background:rgba(34,197,94,.2);color:#86EFAC}
.prow{padding:7px 0;border-bottom:1px solid var(--brd);font-size:12px;color:var(--texto);display:flex;gap:7px;line-height:1.4}
.prow:last-child{border-bottom:none}
.pnum{font-size:10px;font-weight:600;color:var(--texto3);flex-shrink:0;margin-top:2px}
.angles{background:var(--cinza);border:1px solid var(--brd);border-radius:var(--r);padding:14px;margin-bottom:12px}
.ao{display:flex;align-items:flex-start;gap:10px;padding:10px;border-radius:var(--rs);cursor:pointer;border:1px solid transparent;margin-bottom:6px;transition:background .1s,border-color .1s}
.ao:hover{background:rgba(255,255,255,.04)}
.ao.on{background:var(--vermelho-l);border-color:var(--vermelho)}
.ao:last-child{margin-bottom:0}
.ar{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--brd2);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center}
.ao.on .ar{border-color:var(--vermelho);background:var(--vermelho)}
.ao.on .ar::after{content:'';width:4px;height:4px;border-radius:50%;background:white}
.atxt{font-size:12px;color:var(--texto);line-height:1.4}
.anum{font-size:9px;font-weight:700;color:var(--texto3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}

/* GENERATE */
.ggrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.gc{background:var(--cinza);border:1px solid var(--brd);border-radius:var(--r);padding:14px}
.gc.full{grid-column:1/-1}
.gc-lbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--texto3);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.prompt-box{font-size:12px;line-height:1.7;color:var(--texto);background:var(--preto);border-radius:var(--rs);padding:12px;border:1px solid var(--brd)}
.cap-txt{font-size:13px;line-height:1.8;color:var(--texto)}
.htchip{display:inline-block;font-size:10px;padding:3px 8px;border-radius:20px;background:var(--preto);border:1px solid var(--brd);color:var(--texto2);margin:2px}
.fmts{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
.fmt{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em}
.fmt-ai{background:rgba(208,30,40,.2);color:#FF6B70}
.fmt-sz{background:rgba(34,197,94,.2);color:#86EFAC}
.divl{height:1px;background:var(--brd);margin:12px 0}

/* BUTTONS */
button{cursor:pointer;font-family:'Barlow',sans-serif;border:1px solid var(--brd2);background:transparent;color:var(--texto);padding:7px 14px;border-radius:var(--rs);font-size:12px;transition:all .15s}
button:hover{background:rgba(255,255,255,.06)}
button:disabled{opacity:.3;cursor:default}
.btn-p{background:var(--vermelho);color:white;border-color:var(--vermelho);font-weight:500}
.btn-p:hover:not(:disabled){background:#B01820}
.btn-c{background:#7D2AE8;color:white;border-color:#7D2AE8}
.btn-c:hover{background:#6920C5}
.cbtn{font-size:10px;padding:2px 8px;border-radius:20px}
.arow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px}

/* LOADING */
.ldg{display:flex;align-items:center;gap:10px;padding:20px;color:var(--texto2);font-size:13px}
.spin{width:18px;height:18px;border:2px solid var(--brd);border-top-color:var(--vermelho);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.err{padding:14px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:var(--r);font-size:12px;color:#FCA5A5;margin-bottom:10px}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--cinza2);border:1px solid var(--brd2);color:var(--texto);font-size:12px;padding:10px 16px;border-radius:var(--rs);opacity:0;transform:translateY(8px);transition:all .2s;z-index:999;pointer-events:none}
.toast.on{opacity:1;transform:translateY(0)}

@media(max-width:800px){
  .shell{grid-template-columns:1fr}
  .sidebar{position:static;height:auto}
  .rgrid,.ggrid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- CONFIG BAR -->
<div class="config-bar">
  <label>URL do Worker:</label>
  <input class="config-input" type="text" id="workerUrl"
    placeholder="https://poststudio.seu-usuario.workers.dev"
    value="">
  <span id="configDot" class="config-err"></span>
  <span id="configStatus" class="config-status">Cole a URL do seu Cloudflare Worker</span>
</div>

<div class="shell">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">
    <div class="logo-name">POST<span>STUDIO</span></div>
    <div class="logo-sub">Academia do SESI</div>
  </div>
  <div class="brand-sec">
    <div class="slbl">Identidade</div>
    <div class="fg"><label class="fl">Nome da academia</label>
      <input class="fi" type="text" id="brandName" placeholder="Ex: Academia do SESI - SP" value="Academia do SESI">
    </div>
    <div class="fg">
      <label class="fl">Cor da marca</label>
      <div class="cr">
        <div class="cs on" style="background:#D01E28" data-c="#D01E28" onclick="pc(this)"></div>
        <div class="cs" style="background:#1A1A1A;border:1px solid #555" data-c="#1A1A1A" onclick="pc(this)"></div>
        <div class="cs" style="background:#2563EB" data-c="#2563EB" onclick="pc(this)"></div>
        <div class="cs" style="background:#7C3AED" data-c="#7C3AED" onclick="pc(this)"></div>
        <div class="cs" style="background:#059669" data-c="#059669" onclick="pc(this)"></div>
        <div class="cs" style="background:#D97706" data-c="#D97706" onclick="pc(this)"></div>
        <div class="cs" style="background:#DB2777" data-c="#DB2777" onclick="pc(this)"></div>
      </div>
    </div>
    <div class="fg"><label class="fl">Tom de voz</label>
      <select class="fi" id="brandTone">
        <option>Acolhedor e gentil</option>
        <option>Motivador e energético</option>
        <option>Educativo e informativo</option>
        <option>Inspiracional e poético</option>
      </select>
    </div>
    <div class="fg"><label class="fl">Público</label>
      <select class="fi" id="brandAud">
        <option>Adultos 30–55 anos</option>
        <option>Jovens adultos 20–35 anos</option>
        <option>50+ anos</option>
        <option>Principalmente mulheres</option>
        <option>Todos os perfis</option>
      </select>
    </div>
  </div>
  <div class="mths"><div class="slbl">Meses</div><div id="mthList"></div></div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div class="pills">
      <span class="pill on" id="p1">1 · Postagem</span><span class="psep">›</span>
      <span class="pill" id="p2">2 · Trends</span><span class="psep">›</span>
      <span class="pill" id="p3">3 · Gerar</span>
    </div>
    <div id="tba"></div>
  </div>

  <div class="cnt">
    <div class="view on" id="v1">
      <div class="sec-lbl" id="mtitle">Janeiro — selecione uma postagem</div>
      <div class="pgrid" id="pgrid"></div>
      <div class="arow"><button class="btn-p" id="btnR" disabled onclick="goR()">Pesquisar trends →</button></div>
    </div>
    <div class="view" id="v2"><div class="ban" id="ban2"></div><div id="rArea"></div></div>
    <div class="view" id="v3"><div class="ban" id="ban3"></div><div class="ggrid" id="gArea"></div></div>
  </div>
</main>
</div>

<div class="toast" id="toast"></div>

// ── API CALL via Worker ──
async function callClaude(msg){
  const url = getWorkerUrl();
  if(!url) throw new Error('Configure a URL do Worker na barra superior');
  const res = await fetch(url, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:1200,
      messages:[{role:'user',content:msg}]
    })
  });
  if(!res.ok){
    const t=await res.text();
    throw new Error(`Worker retornou ${res.status}: ${t.slice(0,200)}`);
  }
  const d=await res.json();
  if(d.error) throw new Error(d.error);
  return d.content.map(c=>c.text||'').join('');
}

function parseJSON(raw){
  const clean=raw.replace(/```json|```/g,'').trim();
  const s=clean.indexOf('{'),e=clean.lastIndexOf('}');
  if(s<0||e<0) throw new Error('JSON não encontrado na resposta');
  return JSON.parse(clean.slice(s,e+1));
}

function cpEl(id,btn){

function expTXT(g){
  if(!selPost)return;
  const p=selPost;
  const lines=[
    `POSTSTUDIO — ${getName().toUpperCase()}`,'='.repeat(50),'',
    `DATA: ${p.date} · ${p.month}`,`CATEGORIA: ${p.catL}`,`TÍTULO: ${p.title}`,
    `FORMATO: Imagem única · Feed · 1080×1080px`,'',
    '─'.repeat(50),'DIRETRIZ VISUAL','─'.repeat(50),g.visualDirective||'',
    '','─'.repeat(50),'LEGENDA','─'.repeat(50),g.caption,'',
    '─'.repeat(50),'HASHTAGS','─'.repeat(50),g.hashtags.join(' '),'',
    '─'.repeat(50),`Gerado por PostStudio — ${new Date().toLocaleDateString('pt-BR')}`,
  ].join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([lines],{type:'text/plain;charset=utf-8'}));
  a.download=`${p.date.replace('/','')}-${p.month.toLowerCase()}.txt`;
  a.click();
  showToast('Arquivo baixado!');
}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');

}
